# Render Blueprint for the DevSquad AI backend.
# Deploy: https://dashboard.render.com  ->  New  ->  Blueprint  ->  pick this repo.
# It provisions a free PostgreSQL database and the FastAPI service (Docker),
# wiring DATABASE_URL automatically and generating a JWT secret.

databases:
  - name: devsquad-db
    plan: free
    databaseName: devsquad
    user: devsquad

services:
  - type: web
    name: devsquad-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devsquad-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      # The Vercel frontend proxies /api server-side, so CORS is not triggered
      # by the browser. "*" is fine for a public demo; tighten if you later call
      # the API directly from the browser.
      - key: CORS_ORIGINS
        value: "*"

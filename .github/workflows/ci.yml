name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  LOG_LEVEL: debug

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: devsquad
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d devsquad"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show environment info
        run: |
          echo "Python: $(python --version)"
          echo "OS: $(uname -a)"
          echo "Working dir: $(pwd)"

      - name: Install uv
        run: |
          pip install uv --quiet
          uv --version

      - name: Install dependencies
        run: uv sync --verbose

      - name: Install lint tools
        run: uv pip install ruff mypy

      - name: Run lint
        run: uv run ruff check . -v

      - name: Run type check
        run: uv run mypy app --verbose

      - name: Debug DB connection
        run: |
          uv run python -c "
import asyncio, os
os.environ['DATABASE_URL'] = 'postgresql+asyncpg://postgres:postgres@localhost:5432/devsquad'
from app.core.config import settings
from app.core.database import engine
async def check():
    try:
        async with engine.begin() as conn:
            print('DB CONNECTION OK')
            await conn.run_sync(lambda _: print('SCHEMA SYNC OK'))
    except Exception as e:
        print(f'DB ERROR: {type(e).__name__}: {e}')
asyncio.run(check())
"
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/devsquad
          JWT_SECRET: test-secret
          APP_ENV: test

      - name: Run tests
        run: uv run pytest -v --tb=long --showlocals --capture=no 2>&1 | head -100
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/devsquad
          JWT_SECRET: test-secret
          APP_ENV: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Show environment info
        run: |
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "OS: $(uname -a)"

      - name: Install dependencies
        run: npm ci --loglevel verbose

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run typecheck -- --verbose

      - name: Run tests
        run: npm run test -- --reporter=verbose
        continue-on-error: true

      - name: Build
        run: npm run build
